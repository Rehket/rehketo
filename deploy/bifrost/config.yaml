# Bifrost config. Verify the current schema against:
#   https://github.com/maximhq/bifrost
#
# Bifrost's config format has evolved across releases; if the container rejects
# this file, consult the upstream docs and adjust keys rather than fighting it.
#
# Minimal Plan 2 shape: one Anthropic provider with an API key from env, one
# model alias so rehketo-api can request "claude-sonnet-4-6" without leaking
# provider-specific naming into application code.

server:
  listen: "0.0.0.0:8088"

providers:
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}

models:
  claude-sonnet-4-6:
    provider: anthropic
    # If Anthropic releases a newer Sonnet, swap the provider_model here
    # without touching rehketo-api's AGENT_MODEL env var.
    provider_model: claude-sonnet-4-6

# Enable the OpenAI-compatible Responses API surface so LangChain's
# ChatOpenAI(use_responses_api=True) can speak to Bifrost unchanged.
responses_api:
  enabled: true
