name: rehketo

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rehketo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rehketo}
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "rehketo"]
      interval: 5s
      timeout: 3s
      retries: 10

  bifrost:
    image: maximhq/bifrost:latest
    ports: ["8088:8088"]
    environment:
      BIFROST_POSTGRES_DSN: postgres://${POSTGRES_USER:-rehketo}:${POSTGRES_PASSWORD:-rehketo}@postgres:5432/bifrost
    volumes:
      # Bifrost writes config + state to /app/data (config.json, keys, logs).
      # Providers and model aliases are managed through the Bifrost UI at
      # http://localhost:8088 — do NOT bake them into a mounted file.
      - bifrost_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  bifrost_data:
