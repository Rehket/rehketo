version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
  - package-ecosystem: "uv"
    directory: "/rehketo-api"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
  - package-ecosystem: "npm"
    directory: "/rehketo-ui"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
