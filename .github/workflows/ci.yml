name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.f.outputs.api }}
      ui: ${{ steps.f.outputs.ui }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: f
        with:
          filters: |
            api:
              - 'rehketo-api/**'
              - 'tools/**'
              - 'AGENTS.md'
            ui:
              - 'rehketo-ui/**'
              - 'tools/**'

  guards:
    name: Agent Guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-python
      - name: Run custom guards
        run: uv run --project rehketo-api python tools/agent_guards.py check
      - name: Guard + sync tests
        run: uv run --project rehketo-api pytest tools/tests -q
      - name: Regenerate AGENTS.md mirrors
        run: uv run --project rehketo-api python tools/sync_agent_rules.py
      - name: Assert mirrors are in sync with AGENTS.md
        run: git diff --exit-code AGENTS.md CLAUDE.md .github/copilot-instructions.md .cursor/rules/main.mdc

  api:
    name: API
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rehketo-api
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-python
      - run: uv run ruff format --check
      - run: uv run ruff check
      - run: uv run mypy rehketo
      - run: uv run bandit -r rehketo
      - name: import-linter
        run: bash ../tools/_lint_imports.sh
      - run: uv run pytest
      - name: contract snapshot
        run: uv run python ../tools/check_contract.py

  ui:
    name: UI
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rehketo-ui
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: rehketo-ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run check
      - run: pnpm run test:unit -- --run

  e2e:
    name: Offline E2E (Playwright)
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-python
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: rehketo-ui/pnpm-lock.yaml
      - name: Install UI deps + Playwright chromium
        working-directory: rehketo-ui
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium
      - name: Run offline E2E suite
        working-directory: rehketo-api
        run: uv run pytest -m e2e -v
